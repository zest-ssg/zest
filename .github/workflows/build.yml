name: Build Releases

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build & publish the zest .NET Tool to NuGet ─────────
  nuget:
    name: NuGet Tool Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for SourceLink / repository commit metadata

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore zest.sln

      - name: Build solution
        run: dotnet build zest.sln --configuration Release --no-restore

      - name: Pack tool
        # PackAsTool=true in Zest.App.csproj produces a DotnetTool .nupkg
        # with PackageId=zest, ToolCommandName=zest. Users install via:
        #   dotnet tool install -g zest
        run: dotnet pack src/Zest.App/Zest.App.csproj -c Release --no-build -o ./nupkg

      - name: Verify package metadata
        run: |
          echo "=== Produced .nupkg ==="
          ls -la ./nupkg/*.nupkg
          echo "=== nuspec metadata ==="
          unzip -p ./nupkg/zest.*.nupkg zest.nuspec

      - name: Publish to NuGet.org
        # Only push on tag pushes (v*). PR builds only verify packing works.
        if: startsWith(github.ref, 'refs/tags/v') && env.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push ./nupkg/zest.*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: zest-nupkg
          path: ./nupkg/*.nupkg
          retention-days: 30

  # ── Build zest CLI binary for each platform ─────────────
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: win
            rid: win-x64
            arch: x64
            ext: zip
          - os: linux
            rid: linux-x64
            arch: x64
            ext: tar.gz
          - os: linux
            rid: linux-arm64
            arch: arm64
            ext: tar.gz
          - os: osx
            rid: osx-arm64
            arch: arm64
            ext: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore zest.sln

      - name: Build solution
        run: dotnet build zest.sln --configuration Release --no-restore

      - name: Publish for ${{ matrix.rid }}
        run: |
          dotnet publish src/Zest.App/Zest.App.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained false \
            -o ./publish/${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.ext == 'zip'
        run: |
          cd ./publish/${{ matrix.rid }}
          zip -r ../../zest-${{ matrix.rid }}.zip .

      - name: Package (tar.gz)
        if: matrix.ext == 'tar.gz'
        run: |
          cd ./publish/${{ matrix.rid }}
          tar -czf ../../zest-${{ matrix.rid }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zest-${{ matrix.rid }}
          path: zest-${{ matrix.rid }}.${{ matrix.ext }}
          retention-days: 30

  # ── Create GitHub Release on tag ─────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [nuget, build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/*
