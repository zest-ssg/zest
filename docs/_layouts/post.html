---
layout: "default"
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time>{{ page.date }}</time>
      {{ if page.tags }}
      <div class="tags">
        {{ page.tags }}
      </div>
      {{ end }}
    </div>
  </header>
  <div class="post-content">{{ content }}</div>
  <nav class="post-nav">
    <a href="/guide/">&larr; 返回指南</a>
  </nav>
</article>
