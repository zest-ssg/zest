---
layout: "default"
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time>{{ page.date }}</time>
      <span class="tags">{{ page.tags }}</span>
    </div>
  </header>
  <div class="post-content">{{ content }}</div>
  <nav class="post-nav">
    <a href="/guide/">&larr; Back to Guide</a>
  </nav>
</article>
