---
layout: "default"
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      {{#if page.date}}<time>{{ page.date }}</time>{{/if}}
      {{#each page.tags}}<a href="/tags/{{ this }}/" class="tag">{{ this }}</a>{{/each}}
    </div>
  </header>
  <div class="post-content">{{ content }}</div>
  <nav class="post-nav">
    <a href="/guide/">&larr; Back to Guide</a>
  </nav>
</article>
