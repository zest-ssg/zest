<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} &mdash; {{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <link rel="stylesheet" href="/assets/css/core.css">
  <script src="/assets/js/main.js" defer></script>
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="logo">Zest SSG</a>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/blog/">博客</a></li>
      <li><a href="/showcase/">Showcase</a></li>
      <li><a href="/guide/">指南</a></li>
    </ul>
  </nav>

  <main>
    <article class="post">
      <p class="post-breadcrumb"><a href="/blog/">← 博客</a></p>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">
        <time>{{ page.date }}</time>
        {{ page.tags }}
      </p>
      <div class="post-content">{{ content }}</div>
      <p class="post-footer"><a href="/blog/">← 返回博客</a></p>
    </article>
  </main>

  <footer class="site-footer">
    <p>由 <strong>Zest SSG</strong> {{ site.version }} 强力驱动 &mdash; 构建于 {{ site.build_time }}</p>
    <p>
      <a href="/">首页</a> ·
      <a href="/blog/">博客</a> ·
      <a href="/showcase/">Showcase</a> ·
      <a href="/guide/">指南</a>
    </p>
  </footer>
</body>
</html>
