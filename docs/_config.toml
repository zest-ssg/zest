# Zest SSG — 官方展示站点
title        = "Zest SSG"
base_url     = "http://localhost:8080"
description  = "Zenith Efficient Static Toolkit — 基于 F# 的现代化静态站点生成器"
language     = "zh-CN"

content_dir  = "./content"
output_dir   = "./_site"
layouts_dir  = "./_layouts"
includes_dir = "./_includes"
data_dir     = "./_data"
assets_dir   = "./assets"

default_layout      = "default"
template_engine     = "znjk"
permalink_format    = "/:slug/"

dev_server_port  = 8080
live_reload_port = 35729

enable_parallel_build    = true
enable_incremental_build = true
log_level                = "Info"

# ── 集合定义 ──
[collections.blog]
output   = true
sort_by  = "date"
order_by = "desc"

[collections.showcase]
output   = true
sort_by  = "title"

[[menu.main]]
label  = "首页"
url    = "/"
weight = 1

[[menu.main]]
label  = "博客"
url    = "/blog/"
weight = 2

[[menu.main]]
label  = "Showcase"
url    = "/showcase/"
weight = 3

[[menu.main]]
label  = "指南"
url    = "/guide/"
weight = 4

[[menu.main]]
label  = "归档"
url    = "/archive/"
weight = 5
