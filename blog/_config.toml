title        = "Zest 博客"
base_url     = "http://localhost:8080"
description  = "一个用 Zest SSG 构建的示例博客 — 展示 F# 模板、ZSS 样式与 collections API"
author       = "Zest 团队"
language     = "zh-CN"

content_dir  = "./content"
output_dir   = "./_site"
layouts_dir  = "./_layouts"
includes_dir = "./_includes"
data_dir     = "./_data"
assets_dir   = "./assets"

default_layout          = "default"
enable_parallel_build   = true
enable_incremental_build = true

[[taxonomies]]
name   = "tag"
plural = "tags"

[[taxonomies]]
name   = "category"
plural = "categories"

[[menu.main]]
label  = "首页"
url    = "/"
weight = 1

[[menu.main]]
label  = "文章"
url    = "/posts/"
weight = 2

[[menu.main]]
label  = "归档"
url    = "/archive/"
weight = 3

[[menu.main]]
label  = "关于"
url    = "/about/"
weight = 4
